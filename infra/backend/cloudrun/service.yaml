apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${SERVICE_NAME}
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: ${PROJECT_ID}:${REGION}:${CLOUD_SQL_INSTANCE}
    spec:
      containers:
        - image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/backend:${IMAGE_TAG}
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_NAME
              value: ${DB_NAME}
            - name: DB_USER
              value: ${DB_USER}
            - name: DB_SOCKET_PATH
              value: ${DB_SOCKET_PATH}
            - name: DB_INSTANCE_CONNECTION_NAME
              value: ${PROJECT_ID}:${REGION}:${CLOUD_SQL_INSTANCE}
            - name: FRONTEND_ORIGINS
              value: ${FRONTEND_ORIGINS}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  secret: ${DB_PASSWORD_SECRET}
                  version: ${DB_PASSWORD_VERSION}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  secret: ${JWT_SECRET_SECRET}
                  version: ${JWT_SECRET_VERSION}
